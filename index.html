<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify - Your favourite music is here</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="icon.png" />
    <script
      src="https://kit.fontawesome.com/26504e4a1f.js"
      crossorigin="anonymous"
    ></script>
    <style>
      /* Add dark mode styles */
      body.dark-mode {
        background-color: #121212;
        color: #ffffff;
      }

      body.dark-mode .songItem {
        background-color: #1e1e1e;
        border-color: #444;
      }

      body.dark-mode nav,
      body.dark-mode .bottom {
        background-color: #222;
      }

      body.dark-mode input,
      body.dark-mode button {
        background-color: #333;
        color: #fff;
      }

      #utility-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        margin: 10px;
      }

      #search-input {
        padding: 6px;
        width: 200px;
      }

      #toggle-dark-mode {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: inherit;
      }
    </style>
  </head>

  <body>
    <!-- Utility Bar: Search + Dark Mode -->
    <div id="utility-bar">
      <!-- 🔍 Search Bar -->
      <input
        type="text"
        id="search-input"
        placeholder="Search songs..."
        title="Search by song name"
      />

      <!-- 🌙/☀️ Dark Mode Toggle Button -->
      <button id="toggle-dark-mode" title="Toggle Dark Mode">
        <i class="fas fa-moon"></i>
      </button>
    </div>

    <!-- Navbar -->
    <nav>
      <ul>
        <li class="brand"><img src="logo.png" alt="Spotify" /> Spotify</li>
      </ul>
    </nav>

    <!-- Main Container -->
    <div class="container">
      <div class="songList">
        <h1>Best of NCS - No Copyright Sounds</h1>
        <div class="songItemContainer">
          <div class="songItem">
            <img alt="1" />
            <span class="songName">On & On</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >02:50 <i id="0" class="far songItemPlay fa-play-circle"></i>
              </span></span
            >
          </div>
          <div class="songItem">
            <img alt="1" />
            <span class="songName">Invincible</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >02:50 <i id="1" class="far songItemPlay fa-play-circle"></i>
              </span></span
            >
          </div>
          <div class="songItem">
            <img alt="1" />
            <span class="songName">Mortals</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >02:50 <i id="2" class="far songItemPlay fa-play-circle"></i>
              </span></span
            >
          </div>
          <div class="songItem">
            <img alt="1" />
            <span class="songName">Shine</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >02:50 <i id="3" class="far songItemPlay fa-play-circle"></i>
              </span></span
            >
          </div>
          <div class="songItem">
            <img alt="1" />
            <span class="songName">Why We Lose</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >02:50 <i id="4" class="far songItemPlay fa-play-circle"></i>
              </span></span
            >
          </div>
          <div class="songItem">
            <img alt="1" />
            <span class="songName">Sky High</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >02:50 <i id="5" class="far songItemPlay fa-play-circle"></i>
              </span></span
            >
          </div>
          <div class="songItem">
            <img alt="1" />
            <span class="songName">Symbolism</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >02:50 <i id="6" class="far songItemPlay fa-play-circle"></i>
              </span></span
            >
          </div>
          <div class="songItem">
            <img alt="1" />
            <span class="songName">Heroes Tonight</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >02:50 <i id="7" class="far songItemPlay fa-play-circle"></i>
              </span></span
            >
          </div>
          <div class="songItem">
            <img alt="1" />
            <span class="songName">Feel Good</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >02:50 <i id="8" class="far songItemPlay fa-play-circle"></i>
              </span></span
            >
          </div>
          <div class="songItem">
            <img alt="1" />
            <span class="songName">My Heart</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >02:50 <i id="9" class="far songItemPlay fa-play-circle"></i>
              </span></span
            >
          </div>
        </div>
      </div>
      <div class="songBanner"></div>
    </div>

    <!-- Player Bottom Bar -->
    <div class="bottom">
      <input
        type="range"
        name="range"
        id="myProgressBar"
        min="0"
        value="0"
        max="100"
      />
      <div class="icons">
        <i class="fas fa-3x fa-step-backward" id="previous"></i>
        <i class="far fa-3x fa-play-circle" id="masterPlay"></i>
        <i class="fas fa-3x fa-step-forward" id="next"></i>
      </div>
      <div class="songInfo">
        <img src="playing.gif" width="42px" alt="" id="gif" />
        <span id="masterSongName">On & On-Cartoon, Daniel Levi</span>
      </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script>
      // Dark mode toggle logic
      const darkToggle = document.getElementById('toggle-dark-mode');
      darkToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        const icon = darkToggle.querySelector('i');
        icon.classList.toggle('fa-moon');
        icon.classList.toggle('fa-sun');
      });

      // Song search logic
      document.getElementById('search-input').addEventListener('input', function () {
        const query = this.value.toLowerCase();
        const songs = document.querySelectorAll('.songItem');

        songs.forEach((item) => {
          const songName = item.querySelector('.songName').textContent.toLowerCase();
          item.style.display = songName.includes(query) ? '' : 'none';
        });
      });
    </script>
  </body>
</html>
